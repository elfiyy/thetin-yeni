<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THEtin On Air</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: #0d0d0d;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .card {
            background: #141414;
            border: 2px solid #e50914;
            border-radius: 20px;
            width: 100%;
            max-width: 380px;
            padding: 30px 20px;
            text-align: center;
            box-shadow: 0 0 25px rgba(229, 9, 20, 0.35);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .logo-container {
            width: 130px;
            height: 130px;
            margin-bottom: 15px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .logo-container img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        .title {
            font-size: 22px;
            font-weight: bold;
            margin-bottom: 10px;
            letter-spacing: 1px;
        }

        .description {
            font-size: 12px;
            color: #aaa;
            line-height: 1.5;
            margin-bottom: 25px;
            padding: 0 10px;
        }

        .links-container {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .link-btn {
            width: 100%;
            padding: 14px;
            background-color: #1a1a1a;
            color: #ffffff;
            text-decoration: none;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 500;
            border: 1px solid #2a2a2a;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .link-btn:hover {
            background-color: #e50914;
            border-color: #e50914;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(229, 9, 20, 0.2);
        }

        .footer {
            margin-top: 30px;
            font-size: 11px;
            color: #777;
            letter-spacing: 0.5px;
        }
    </style>
</head>
<body>

    <div class="card">
        <!-- Logo -->
        <div class="logo-container">
            <img src="Logo.png" alt="THEtin On Air Logo">
        </div>

        <h1 class="title">THEtin On Air</h1>

        <p class="description">
            Yayında ve yayında olamayan zamanlarda bana sosyal medya hesaplarımdan ulaşabilir ve takip edebilirsiniz.
        </p>

        <!-- Sosyal Medya Linkleri -->
        <div class="links-container">
            <a href="https://kick.com/thetin" target="_blank" rel="noopener noreferrer" class="link-btn">
                <span>🟢 Kick Canlı Yayın</span>
            </a>

            <a href="https://discord.gg/thetin" target="_blank" rel="noopener noreferrer" class="link-btn">
                <span>💬 Discord Sunucusu</span>
            </a>

            <a href="https://www.instagram.com/thetin.onair" target="_blank" rel="noopener noreferrer" class="link-btn">
                <span>📸 Instagram</span>
            </a>

            <a href="https://www.tiktok.com/@thetin.onair" target="_blank" rel="noopener noreferrer" class="link-btn">
                <span>🎵 TikTok Yayınları</span>
            </a>
        </div>

        <!-- Tasarımcı İmzası -->
        <div class="footer">
            Design by elwinna
        </div>
    </div>

</body>
</html>
