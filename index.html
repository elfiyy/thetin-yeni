<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THEtin On Air</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: #050505;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .card {
            background: #0f0f0f;
            border: 1px solid #ff0000;
            border-radius: 24px;
            width: 100%;
            max-width: 360px;
            padding: 32px 24px;
            text-align: center;
            box-shadow: 0 0 30px rgba(255, 0, 0, 0.25);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .logo-container {
            width: 120px;
            height: 120px;
            margin-bottom: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .logo-container img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .title {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 12px;
            letter-spacing: 0.5px;
        }

        .description {
            font-size: 11px;
            color: #888888;
            line-height: 1.6;
            margin-bottom: 28px;
            padding: 0 8px;
        }

        .links-container {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .link-btn {
            width: 100%;
            padding: 14px 16px;
            background-color: #161616;
            color: #ffffff;
            text-decoration: none;
            border-radius: 12px;
            font-size: 13px;
            font-weight: 600;
            border: 1px solid #222222;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .link-btn:hover {
            background-color: #202020;
            border-color: #ff0000;
            transform: translateY(-1px);
        }

        .footer {
            margin-top: 32px;
            font-size: 10px;
            color: #555555;
            letter-spacing: 1px;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <div class="card">
        <!-- Logo -->
        <div class="logo-container">
            <img src="Logo.png" alt="THEtin On Air Logo">
        </div>

        <h1 class="title">THEtin On Air</h1>

        <p class="description">
            Yayında ve yayında olamayan zamanlarda bana sosyal medya hesaplarımdan ulaşabilir ve takip edebilirsiniz.
        </p>

        <!-- Sosyal Medya Linkleri -->
        <div class="links-container">
            <a href="https://kick.com/thetin" target="_blank" class="link-btn">
                <span>🟢 Kick Canlı Yayın</span>
            </a>

            <a href="https://discord.gg/thetin" target="_blank" class="link-btn">
                <span>💬 Discord Sunucusu</span>
            </a>

            <a href="https://www.instagram.com/thetin.onair" target="_blank" class="link-btn">
                <span>📸 Instagram</span>
            </a>

            <a href="https://www.tiktok.com/@thetin.onair" target="_blank" class="link-btn">
                <span>🎵 TikTok Yayınları</span>
            </a>
        </div>

        <!-- Yalnızca İstenen İmza -->
        <div class="footer">
            Design by elwinna
        </div>
    </div>

</body>
</html>
