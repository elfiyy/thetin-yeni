<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>THEtin On Air 🎸 Rock & Gamer World</title>

    <!-- Piksel Yazı Tipi -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

    <!-- İkonlar -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        /* Kesin Mobil Reset */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #08080a;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 24px 16px;
            position: relative;
            overflow-x: hidden;
        }

        /* --- DİNAMİK/HAREKETLİ RETRO ARKA PLAN --- */
        body::before {
            content: "";
            position: fixed;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background-image: linear-gradient(rgba(220, 38, 38, 0.05) 1px, transparent 1px), linear-gradient(90deg, rgba(220, 38, 38, 0.05) 1px, transparent 1px);
            background-size: 30px 30px;
            transform: perspective(500px) rotateX(60deg);
            animation: gridScroll 12s linear infinite;
            z-index: -2;
        }

        /* Arka plandaki derinlik ve parlamalar */
        body::after {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 50% 50%, rgba(220, 38, 38, 0.12) 0%, transparent 70%), radial-gradient(circle at 80% 20%, rgba(147, 51, 234, 0.05) 0%, transparent 40%);
            animation: pulseGlow 8s ease-in-out infinite alternate;
            z-index: -1;
        }

        /* --- PREMIUM KART --- */
        .card-container {
            background-color: rgba(22, 22, 26, 0.95);
            border: 3px solid #dc2626;
            box-shadow: 0px 0px 25px rgba(220, 38, 38, 0.25), inset 0px 0px 15px rgba(0,0,0,0.6);
            width: 100%;
            max-width: 380px;
            padding: 35px 22px;
            text-align: center;
            border-radius: 12px;
            z-index: 1;
            backdrop-filter: blur(4px);
        }

        /* --- PROFESYONEL YUVARLAK LOGO --- */
        .pixel-art-header {
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 22px;
        }

        .pixel-logo {
            height: 120px;
            width: 120px;
            object-fit: cover;
            border-radius: 50%;
            border: 4px solid #dc2626;
            background-color: #161616;
            box-shadow: 0 0 20px rgba(220, 38, 38, 0.6);
            transition: transform 0.3s ease;
        }

        .pixel-logo:hover {
            transform: scale(1.05) rotate(3deg);
        }

        h1 {
            font-family: 'Press Start 2P', cursive;
            font-size: 14px;
            color: #ffffff;
            margin-bottom: 10px;
            line-height: 1.4;
            letter-spacing: 0.5px;
            text-shadow: 2px 2px 0px rgba(0, 0, 0, 0.8);
        }

        h2 {
            font-size: 11px;
            font-weight: 600;
            color: #a3a3a3;
            margin-bottom: 24px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
        }

        .bio-box {
            font-size: 13px;
            color: #d1d5db;
            line-height: 1.6;
            margin-bottom: 26px;
            background: rgba(34, 34, 38, 0.6);
            padding: 14px;
            border-left: 4px solid #dc2626;
            text-align: left;
            border-radius: 4px;
        }

        .links-container {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .link-item {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            text-decoration: none;
            font-size: 14px;
            font-weight: bold;
            color: #ffffff;
            background-color: #222226;
            border: 2px solid #2d2d3d;
            padding: 15px 12px;
            box-shadow: 4px 4px 0px #000000;
            transition: all 0.2s ease-in-out;
            border-radius: 8px;
            cursor: pointer;
        }

        /* Masaüstü Hover */
        @media (hover: hover) {
            .link-item:hover {
                background-color: #dc2626;
                border-color: #ffffff;
                color: #ffffff;
                transform: translate(-2px, -2px);
                box-shadow: 6px 6px 0px #000000;
            }
        }

        /* Mobil Dokunma */
        .link-item:active {
            transform: translate(2px, 2px);
            box-shadow: 2px 2px 0px #000000;
            background-color: #bc1f1f;
        }

        .link-item i {
            font-size: 18px;
        }

        /* İkon Renkleri */
        .fa-kickstarter {
            color: #53fc18;
        }

        .fa-twitch {
            color: #a970ff;
        }

        .fa-instagram {
            color: #e1306c;
        }

        .fa-tiktok {
            color: #00f2fe;
        }

        /* Animasyonlar */
        @keyframes gridScroll {
            from {
                background-position: 0 0;
            }

            to {
                background-position: 0 300px;
            }
        }

        @keyframes pulseGlow {
            from {
                opacity: 0.7;
            }

            to {
                opacity: 1;
            }
        }

        /* --- BIONLUK LİNKİNİN OLDUĞU FOOTER --- */
        .developer-footer {
            margin-top: 24px;
            font-size: 8px;
            color: #6b7280;
            text-decoration: none;
            font-family: 'Press Start 2P', cursive;
            letter-spacing: 0.5px;
            z-index: 1;
            transition: color 0.2s;
        }

        .developer-footer:hover {
            color: #dc2626;
        }

        @media (max-width: 360px) {
            .card-container {
                padding: 24px 14px;
            }

            h1 {
                font-size: 12px;
            }

            .link-item {
                font-size: 13px;
                padding: 12px 10px;
            }
        }
    </style>
</head>
<body>

    <div class="card-container">

        <div class="pixel-art-header">
            <img src="Logo.png" alt="THEtin Logo" class="pixel-logo">
        </div>

        <h1>THEtin On Air</h1>
        <h2>Gamer • Musician • Streamer 🎸</h2>

        <div class="bio-box">
            Müzik, oyun ve kesintisiz eğlence! Canlı yayınlarıma, sosyal medya hesaplarıma ve topluluğumuza aşağıdaki linklerden ulaşabilirsin. ⚡
        </div>

        <div class="links-container">

            <!-- Kick (Özel Profil Intent & Deep Link) -->
            <a href="https://kick.com/thetin" onclick="openKick(event, 'https://kick.com/thetin');" class="link-item">
                <i class="fa-brands fa-kickstarter"></i> Kick Canlı Yayın
            </a>

            <!-- Twitch -->
            <a href="https://twitch.tv/thetinonair" onclick="openApp(event, 'twitch://stream/thetinonair', 'https://twitch.tv/thetinonair');" class="link-item">
                <i class="fa-brands fa-twitch"></i> Twitch Kanalım
            </a>

            <!-- Instagram -->
            <a href="https://www.instagram.com/thetinonair/" onclick="openApp(event, 'instagram://user?username=thetinonair', 'https://www.instagram.com/thetinonair/');" class="link-item">
                <i class="fa-brands fa-instagram"></i> Instagram
            </a>

            <!-- TikTok (Özel Profil Intent & Deep Link) -->
            <a href="https://www.tiktok.com/@thetinonair" onclick="openTikTok(event, 'https://www.tiktok.com/@thetinonair');" class="link-item">
                <i class="fa-brands fa-tiktok"></i> TikTok Videoları
            </a>

        </div>

    </div>

    <!-- Tıklanabilir Bionluk Linkin -->
    <a href="https://bionluk.com/elwinna" target="_blank" rel="noopener noreferrer" class="developer-footer">
        Design by elwinna
    </a>

    <!-- Profil Yönlendirme Scripti -->
    <script>
        // TikTok Profil Yönlendirmesi
        function openTikTok(e, webUrl) {
            var isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
            if (isMobile) {
                e.preventDefault();
                if (/Android/i.test(navigator.userAgent)) {
                    // Android için doğrudan kullanıcının profiline yönlendiren Intent
                    window.location.href = "intent://user/profile/thetinonair#Intent;scheme=snssdk1180;package=com.zhiliaoapp.musically;S.browser_fallback_url=" + encodeURIComponent(webUrl) + ";end";
                } else {
                    // iOS için direkt TikTok profil adresi
                    window.location.href = "snssdk1180://user/profile/thetinonair";
                    setTimeout(function() {
                        window.location.href = webUrl;
                    }, 1250);
                }
            }
        }

        // Kick Profil Yönlendirmesi
        function openKick(e, webUrl) {
            var isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
            if (isMobile) {
                e.preventDefault();
                if (/Android/i.test(navigator.userAgent)) {
                    // Android Kick uygulaması profil yönlendirmesi
                    window.location.href = "intent://channel/thetin#Intent;scheme=kick;package=com.kick.app;S.browser_fallback_url=" + encodeURIComponent(webUrl) + ";end";
                } else {
                    // iOS Kick uygulaması yönlendirmesi
                    window.location.href = "kick://channel/thetin";
                    setTimeout(function() {
                        window.location.href = webUrl;
                    }, 1250);
                }
            }
        }

        // Genel Sosyal Medya Yönlendirmesi (Twitch, Instagram)
        function openApp(e, appUrl, webUrl) {
            var isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
            if (isMobile) {
                e.preventDefault();
                window.location.href = appUrl;
                setTimeout(function() {
                    window.location.href = webUrl;
                }, 1250);
            }
        }
    </script>

</body>
</html>
